<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Skull &amp; Rose Editorial Portrait Photography &#8212; Still Sonic Media</title>
  <!-- Description shown in Google results -->
  <meta name="description" content="Skull &amp; Rose &#8212; an editorial portrait series by Still Sonic Media, UK, 2023. Dramatic lighting, bold contrast." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="site.css?v=3" />
  <style>
    @font-face { font-family: 'Redaction35'; src: url('fonts/Redaction_35-Regular.woff2') format('woff2'); font-weight: 400; font-display: swap; }
    @font-face { font-family: 'Redaction35'; src: url('fonts/Redaction_35-Bold.woff2') format('woff2'); font-weight: 700; font-display: swap; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0e0e0e; --border: #1e1e1e; --text: #e8e8e8; --muted: #666; --accent: #c8a96e; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'Redaction35', Georgia, serif; font-weight: 400; overflow-x: hidden; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 3rem; background: linear-gradient(to bottom, rgba(14,14,14,0.95) 0%, transparent 100%); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255,255,255,0.04); }
    .nav-logo { display: flex; align-items: center; text-decoration: none; }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--muted); font-size: 0.75rem; letter-spacing: 0.18em; text-transform: uppercase; transition: color 0.3s; font-family: 'Redaction35', Georgia, serif; }
    .nav-links a:hover { color: var(--text); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .nav-instagram { color: var(--muted); text-decoration: none; display: flex; align-items: center; transition: color 0.3s; }
    .nav-hamburger { display: none; background: none; border: none; cursor: pointer; flex-direction: column; gap: 5px; padding: 4px; }
    .nav-hamburger span { display: block; width: 22px; height: 1px; background: var(--muted); transition: transform 0.3s, opacity 0.3s; }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
    @media (max-width: 768px) { nav { padding: 1.2rem 1.5rem; } .nav-hamburger { display: flex; } .nav-links { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(14,14,14,0.97); backdrop-filter: blur(12px); flex-direction: column; align-items: center; justify-content: center; gap: 2.5rem; z-index: 99; } .nav-links.open { display: flex; } .nav-links a { font-size: 1.1rem; } }
    /* Page hero — the big title block at the top */
    .page-hero { min-height: 45vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 10rem 2rem 4rem; position: relative; overflow: hidden; }
    .page-hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(200,169,110,0.05) 0%, transparent 70%); pointer-events: none; }
    .gallery-hero-eyebrow { font-size: 0.68rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }
    .gallery-hero-title { font-family: 'Redaction35', Georgia, serif; font-size: clamp(3rem, 8vw, 6rem); font-weight: 400; line-height: 1.0; }
    .gallery-hero-subtitle { font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-top: 1.5rem; }
    .page-hero-line { width: 1px; height: 40px; background: linear-gradient(to bottom, var(--accent), transparent); margin: 2rem auto 0; }
    /* Photo grid — masonry-style columns */
    #gallery { padding: 5rem 2rem 8rem; }
    .gallery-grid { columns: 3 320px; column-gap: 1rem; max-width: 1400px; margin: 0 auto; }
    .gallery-item { break-inside: avoid; margin-bottom: 1rem; position: relative; overflow: hidden; cursor: pointer; }
    .gallery-item img { width: 100%; display: block; transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94); }
    .gallery-item:hover img { transform: scale(1.04); }
    .gallery-item-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(14,14,14,0.8) 0%, transparent 50%); opacity: 0; transition: opacity 0.4s; display: flex; align-items: flex-end; padding: 1.5rem; }
    .gallery-item:hover .gallery-item-overlay { opacity: 1; }
    .gallery-item-label { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text); }
    /* Lightbox — full-screen image viewer */
    .lightbox { position: fixed; inset: 0; z-index: 9000; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; padding: 2rem; }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
    .lightbox-close { position: absolute; top: 1.5rem; right: 2rem; font-size: 1.5rem; color: var(--muted); cursor: pointer; background: none; border: none; font-family: inherit; transition: color 0.2s; z-index: 9001; }
    .lightbox-close:hover { color: var(--text); }
    .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); font-size: 2rem; cursor: pointer; padding: 1rem; transition: color 0.2s; z-index: 9001; }
    .lightbox-nav:hover { color: var(--text); }
    .lightbox-prev { left: 1rem; } .lightbox-next { right: 1rem; }
    @media (max-width: 768px) { .gallery-grid { columns: 1; } }
    footer { padding: 2rem 3rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .footer-back { color: var(--accent); text-decoration: none; font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; transition: opacity 0.2s; }
    .footer-back:hover { opacity: 0.7; }
    @media (max-width: 768px) { footer { flex-direction: column; gap: 0.75rem; text-align: center; } }
  </style>
</head>
<body>

<!-- Lightbox — full-screen image viewer, opened by clicking a photo -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lbClose">&#x2715;</button>
  <button class="lightbox-nav lightbox-prev" id="lbPrev">&#8249;</button>
  <img src="" alt="" id="lbImg" />
  <button class="lightbox-nav lightbox-next" id="lbNext">&#8250;</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="site.js?v=2"></script>
<script>
  /* Mobile nav toggle */
  var burger=document.getElementById('navBurger'),navLinks=document.getElementById('navLinks');
  if(burger&&navLinks){burger.addEventListener('click',function(){burger.classList.toggle('open');navLinks.classList.toggle('open');});navLinks.querySelectorAll('a').forEach(function(l){l.addEventListener('click',function(){burger.classList.remove('open');navLinks.classList.remove('open');});});}
  /* Lightbox — opens when a gallery image is clicked */
  var items=Array.from(document.querySelectorAll('.gallery-item')),lightbox=document.getElementById('lightbox'),lbImg=document.getElementById('lbImg'),current=0;
  function openLightbox(i){current=i;lbImg.src=items[i].querySelector('img').src;lightbox.classList.add('active');document.body.style.overflow='hidden';}
  function closeLightbox(){lightbox.classList.remove('active');document.body.style.overflow='';}
  function navigate(d){current=(current+d+items.length)%items.length;lbImg.src=items[current].querySelector('img').src;}
  items.forEach(function(item,i){item.addEventListener('click',function(){openLightbox(i);});});
  document.getElementById('lbClose').addEventListener('click',closeLightbox);
  document.getElementById('lbPrev').addEventListener('click',function(){navigate(-1);});
  document.getElementById('lbNext').addEventListener('click',function(){navigate(1);});
  lightbox.addEventListener('click',function(e){if(e.target===lightbox)closeLightbox();});
  document.addEventListener('keydown',function(e){if(!lightbox.classList.contains('active'))return;if(e.key==='Escape')closeLightbox();if(e.key==='ArrowLeft')navigate(-1);if(e.key==='ArrowRight')navigate(1);});
</script>
